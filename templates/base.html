<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Neyman{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}AI-powered restaurant management{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/static/css/neymenu.css">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}
  <div class="page-wrapper">
    {% block content %}{% endblock %}
  </div>
  {% endblock %}

  {% if messages %}
  <div style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:340px;" id="toast-container">
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}"
         style="animation:slideIn .3s ease;box-shadow:var(--shadow-md);">
      {{ message }}
      <button onclick="this.parentElement.remove()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;opacity:.6;">×</button>
    </div>
    {% endfor %}
  </div>
  <style>@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}</style>
  <script>setTimeout(()=>{const c=document.getElementById('toast-container');if(c)c.style.opacity='0';setTimeout(()=>{if(c)c.remove()},400)},4000);</script>
  {% endif %}

  {% block extra_js %}{% endblock %}
</body>
</html>
