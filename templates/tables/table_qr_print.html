{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <title>{% trans "Print QR" %} - {% trans "Table" %} {{ table.table_number }}</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 50px; }
        .qr-container { border: 2px dashed #000; display: inline-block; padding: 20px; }
        img { max-width: 400px; }
        h1 { margin-bottom: 5px; }
        h3 { margin-top: 5px; color: #555; }
        @media print {
            .no-print { display: none; }
            .qr-container { border: none; }
        }
    </style>
</head>
<body>
    <button class="no-print" onclick="window.print()" style="margin-bottom: 20px; padding: 10px 20px; cursor: pointer;">{% trans "Print this page" %}</button>
    <div class="qr-container">
        <h1>{{ table.restaurant.name }}</h1>
        <h3>{% trans "Table" %} {{ table.table_number }} {{ table.table_name }}</h3>
        {% if table.qr_code_image %}
            <img src="{{ table.qr_code_image.url }}" alt="{% trans 'QR Code' %}">
        {% endif %}
        <p>{% trans "Scan to view our menu!" %}</p>
    </div>
</body>
</html>
