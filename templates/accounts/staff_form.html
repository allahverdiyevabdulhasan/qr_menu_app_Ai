{% extends 'dashboard_base.html' %}
{% block content %}
<h2>{% if object %}Edit Staff{% else %}Add Staff{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
    <a href="{% url 'staff_list' %}">Cancel</a>
</form>
{% endblock %}
